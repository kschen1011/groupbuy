<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>半吊子廚房｜團購下單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg: #F7F3EE;
  --surface: #FFFFFF;
  --accent: #C4622D;
  --accent-hover: #A84E20;
  --accent-light: rgba(196,98,45,0.10);
  --green: #3D7848;
  --green-light: rgba(61,120,72,0.10);
  --red: #C0392B;
  --red-light: rgba(192,57,43,0.10);
  --amber: #A07010;
  --amber-light: rgba(160,112,16,0.10);
  --purple: #5B3F9A;
  --purple-light: rgba(91,63,154,0.10);
  --text: #1C1008;
  --text-muted: #7A6A5A;
  --border: #E8E0D5;
  --r-sm: 8px;
  --r-card: 14px;
  --r-lg: 20px;
  --r-pill: 100px;
  --shadow: 0 2px 12px rgba(28,16,8,0.07);
  --shadow-md: 0 4px 24px rgba(28,16,8,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.65;}
h1,h2,h3{font-family:'Noto Serif TC',serif;}
.container{max-width:640px;margin:0 auto;padding:0 16px 96px;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.header-brand{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;color:var(--accent);letter-spacing:.04em;}
.header-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.card{background:var(--surface);border-radius:var(--r-card);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);}
.card-lg{border-radius:var(--r-lg);padding:24px;}
.section-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:5px;}
.field label .req{color:var(--red);}
input,textarea,select{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Noto Sans TC',sans-serif;font-size:15px;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s;appearance:none;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:72px;line-height:1.65;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 22px;border:none;border-radius:var(--r-sm);font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;width:100%;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-outline{background:transparent;color:var(--accent);border:1.5px solid var(--accent);}
.btn-outline:hover{background:var(--accent);color:#fff;}
.btn-ghost{background:transparent;color:var(--text-muted);border:1.5px solid var(--border);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{background:#a93224;}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#2e5c38;}
.btn-sm{padding:6px 13px;font-size:13px;}
.btn-full{width:100%;}
.qty-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);transition:all .15s;flex-shrink:0;line-height:1;}
.qty-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.qty-btn:disabled{opacity:.28;cursor:not-allowed;}
.qty-val{font-size:18px;font-weight:600;min-width:30px;text-align:center;}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--r-pill);font-size:12px;font-weight:500;line-height:1.4;}
.tag-accent{background:var(--accent-light);color:var(--accent);}
.tag-green{background:var(--green-light);color:var(--green);}
.tag-red{background:var(--red-light);color:var(--red);}
.tag-amber{background:var(--amber-light);color:var(--amber);}
.tag-purple{background:var(--purple-light);color:var(--purple);}
.tag-gray{background:rgba(122,106,90,.1);color:var(--text-muted);}
.product-card{background:var(--surface);border-radius:var(--r-card);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);border:1.5px solid transparent;transition:border-color .2s;}
.product-card.active{border-color:var(--accent);}
.product-name{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:600;color:var(--text);}
.product-price{font-size:17px;font-weight:700;color:var(--accent);}
.product-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:10px;}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;}
.order-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px;gap:8px;}
.order-row:last-child{border-bottom:none;}
.order-total{display:flex;justify-content:space-between;padding:12px 0 0;font-weight:700;font-size:17px;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.stat-card{background:var(--surface);border-radius:var(--r-card);padding:12px 8px;text-align:center;box-shadow:var(--shadow);}
.stat-val{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;color:var(--accent);}
.stat-lbl{font-size:12px;color:var(--text-muted);margin-top:2px;}
.pill-tabs{display:flex;background:var(--surface);border-radius:var(--r-pill);padding:4px;margin-bottom:14px;box-shadow:var(--shadow);}
.pill-tab{flex:1;padding:8px 6px;text-align:center;font-size:14px;font-weight:500;color:var(--text-muted);cursor:pointer;border-radius:var(--r-pill);transition:all .2s;}
.pill-tab.active{background:var(--accent);color:#fff;}
.scroll-tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.scroll-tabs::-webkit-scrollbar{display:none;}
.scroll-tab{flex-shrink:0;padding:8px 15px;border-radius:var(--r-pill);font-size:14px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);transition:all .2s;white-space:nowrap;}
.scroll-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.alert{padding:11px 14px;border-radius:var(--r-sm);font-size:14px;margin-bottom:11px;line-height:1.55;}
.alert-amber{background:var(--amber-light);color:var(--amber);border-left:3px solid var(--amber);}
.alert-red{background:var(--red-light);color:var(--red);border-left:3px solid var(--red);}
.alert-green{background:var(--green-light);color:var(--green);border-left:3px solid var(--green);}
.page-top{padding:20px 0 14px;}
.page-title{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;}
.page-desc{font-size:14px;color:var(--text-muted);margin-top:6px;white-space:pre-line;}
.info-chip{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text-muted);margin-top:6px;margin-right:10px;}
.done-circle{width:68px;height:68px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:32px;}
.loading{text-align:center;padding:56px 16px;color:var(--text-muted);}
.footer-links{text-align:center;padding:16px;display:flex;justify-content:center;gap:22px;}
.footer-link{font-size:13px;color:var(--text-muted);cursor:pointer;text-decoration:underline;text-underline-offset:3px;}
.footer-link:hover{color:var(--accent);}
.divider{height:1px;background:var(--border);margin:14px 0;}
.order-item{background:var(--surface);border-radius:var(--r-card);padding:14px;margin-bottom:9px;box-shadow:var(--shadow);}
.order-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
.order-person{font-weight:600;font-size:15px;}
.order-time{font-size:12px;color:var(--text-muted);}
.order-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.order-sum{font-weight:700;color:var(--accent);font-size:15px;}
.modal-bg{position:fixed;inset:0;background:rgba(28,16,8,.48);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:16px;}
.modal{background:var(--surface);border-radius:var(--r-lg) var(--r-lg) var(--r-sm) var(--r-sm);width:100%;max-width:600px;max-height:88vh;overflow-y:auto;padding:24px;}
.modal-title{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;margin-bottom:16px;}
.modal-actions{display:flex;gap:9px;margin-top:18px;}
.back-btn{display:inline-flex;align-items:center;gap:4px;color:var(--text-muted);font-size:14px;cursor:pointer;padding:8px 0 10px;}
.back-btn:hover{color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.prod-editor{background:var(--bg);border-radius:var(--r-card);padding:15px;margin-bottom:11px;border:1.5px solid var(--border);}
.prod-editor-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;}
.input-row{display:flex;gap:8px;}
.input-row input{flex:1;}
.empty-state{text-align:center;padding:48px 16px;color:var(--text-muted);font-size:14px;}
.pickup-stat-bar{display:flex;gap:16px;padding:11px 15px;background:var(--surface);border-radius:var(--r-card);margin-bottom:12px;box-shadow:var(--shadow);font-size:13px;}
.pickup-stat{color:var(--text-muted);}
.pickup-stat b{color:var(--text);font-weight:700;}
.pickup-result{background:var(--surface);border-radius:var(--r-card);padding:15px;margin-bottom:10px;box-shadow:var(--shadow);}
.tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.copy-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r-sm);font-size:13px;font-weight:500;cursor:pointer;background:var(--bg);border:1.5px solid var(--border);color:var(--text-muted);transition:all .2s;font-family:'Noto Sans TC',sans-serif;}
.copy-btn:hover{border-color:var(--accent);color:var(--accent);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease;}
.center-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.center-logo{font-family:'Noto Serif TC',serif;font-size:30px;font-weight:700;color:var(--accent);margin-bottom:6px;}
.center-sub{font-size:14px;color:var(--text-muted);margin-bottom:30px;}
.center-card{background:var(--surface);border-radius:var(--r-lg);padding:28px 24px;width:100%;max-width:360px;box-shadow:var(--shadow-md);}
.sticky-foot{position:sticky;bottom:16px;z-index:50;}
@media(max-width:480px){.form-row{grid-template-columns:1fr;}.stat-val{font-size:18px;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ══════════════════════════════════════════════════════
//  ⚙️  Firebase 設定  ── 請填入您的 Firebase 專案資訊
// ══════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAlx_n5YaGSpnAX-8GQdSBt7lr_2M0PPmQ",
  authDomain:        "my-groupbuy.firebaseapp.com",
  projectId:         "my-groupbuy",
  storageBucket:     "my-groupbuy.firebasestorage.app",
  messagingSenderId: "58893121747",
  appId:             "1:58893121747:web:7f778ae5feb13d603b7c26"
};

let db = null;
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
} catch(e) { console.error(e); }

// ── Helpers ──────────────────────────────────────────
const fmtTs = ts => {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
};
const fmtMoney = n => `NT$ ${(n||0).toLocaleString()}`;
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const isPast = dl => dl ? new Date() > new Date(dl) : false;

const copyText = (text, cb) => {
  if (navigator.clipboard) { navigator.clipboard.writeText(text).then(cb).catch(()=>{}); return; }
  const el = document.createElement('textarea');
  el.value = text;
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
  cb && cb();
};

const downloadCSV = (rows, filename) => {
  const bom = '\uFEFF';
  const content = bom + rows.map(r => r.map(c => `"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([content], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
};

// ── Firestore ops ─────────────────────────────────────
const getConfig = async () => {
  const snap = await db.collection('config').doc('main').get();
  return snap.exists ? snap.data() : null;
};
const saveConfig = async data => db.collection('config').doc('main').set(data, {merge:true});

const getOrders = async (roundId=null) => {
  let q = db.collection('orders');
  if (roundId) q = q.where('roundId','==',roundId);
  const snap = await q.orderBy('ts','desc').get();
  return snap.docs.map(d => ({id:d.id,...d.data()}));
};
const submitOrder = async order => db.collection('orders').add(order);
const updateOrder = async (id, data) => db.collection('orders').doc(id).update(data);
const deleteOrder = async id => db.collection('orders').doc(id).delete();

// ══════════════════════════════════════════════════════
//  App
// ══════════════════════════════════════════════════════
function App() {
  const [page, setPage] = useState('loading');
  const [cfg, setCfg]   = useState(null);
  const [accessOk, setAccessOk] = useState(false);
  const [orderDraft, setOrderDraft] = useState(null);
  const [donedOrder, setDoneOrder] = useState(null);

  useEffect(()=>{ init(); }, []);

  const init = async () => {
    if (!db) { setPage('db-error'); return; }
    try {
      const c = await getConfig();
      setCfg(c);
      if (!c || !c.adminPass) { setPage('setup'); return; }
      if (c.accessCode && !accessOk) { setPage('access'); return; }
      setPage('order');
    } catch(e) { setPage('db-error'); }
  };

  const refreshCfg = async () => {
    const c = await getConfig();
    setCfg(c);
    return c;
  };

  const goto = p => setPage(p);

  if (page === 'loading') return <div className="loading"><div style={{fontSize:36,marginBottom:12}}>🍪</div>載入中…</div>;
  if (page === 'db-error') return (
    <div className="loading">
      <div style={{fontSize:28,marginBottom:10}}>⚠️</div>
      <div style={{fontWeight:600}}>無法連接 Firebase</div>
      <div style={{fontSize:13,marginTop:8,color:'var(--text-muted)'}}>請確認 FIREBASE_CONFIG 設定是否正確</div>
    </div>
  );
  if (page === 'access') return <AccessPage cfg={cfg} onOk={()=>{ setAccessOk(true); setPage('order'); }} />;
  if (page === 'order') return <OrderPage cfg={cfg} onConfirm={d=>{ setOrderDraft(d); setPage('confirm'); }} goto={goto} />;
  if (page === 'confirm') return <ConfirmPage cfg={cfg} draft={orderDraft} onBack={()=>setPage('order')} onDone={o=>{ setDoneOrder(o); setPage('done'); }} />;
  if (page === 'done') return <DonePage order={donedOrder} onBack={()=>setPage('order')} />;
  if (page === 'query') return <QueryPage onBack={()=>setPage('order')} />;
  if (page === 'admin-login') return <AdminLogin cfg={cfg} onOk={()=>setPage('orders')} onBack={()=>setPage('order')} />;
  if (page === 'orders') return <AdminOrders cfg={cfg} refreshCfg={refreshCfg} goto={goto} />;
  if (page === 'pickup') return <PickupPage cfg={cfg} onBack={()=>setPage('orders')} />;
  if (page === 'setup') return <SetupPage cfg={cfg} onSaved={async ()=>{ await refreshCfg(); setPage('orders'); }} onBack={cfg?()=>setPage('orders'):null} />;
  return null;
}

// ══════════════════════════════════════════════════════
//  Access
// ══════════════════════════════════════════════════════
function AccessPage({ cfg, onOk }) {
  const [code, setCode] = useState('');
  const [err, setErr]   = useState('');
  const submit = () => code.trim() === cfg.accessCode ? onOk() : setErr('入場碼錯誤，請再試一次');
  return (
    <div className="center-page">
      <div className="center-logo">半吊子廚房</div>
      <div className="center-sub">The Half Kitchen</div>
      <div className="center-card fade-up">
        <h2 style={{fontFamily:'Noto Serif TC',fontSize:18,marginBottom:16}}>請輸入入場碼</h2>
        <div className="field">
          <input type="text" value={code} onChange={e=>setCode(e.target.value)} placeholder="入場碼" onKeyDown={e=>e.key==='Enter'&&submit()} autoFocus />
        </div>
        {err && <div className="alert alert-red" style={{marginBottom:12}}>{err}</div>}
        <button className="btn btn-primary" onClick={submit}>進入 →</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  Order Page
// ══════════════════════════════════════════════════════
function OrderPage({ cfg, onConfirm, goto }) {
  const [nickname, setNickname] = useState('');
  const [phone, setPhone]       = useState('');
  const [note, setNote]         = useState('');
  const [qty, setQty]           = useState({});
  const [err, setErr]           = useState('');

  if (!cfg) return <div className="loading">載入中…</div>;

  const products = cfg.products || [];
  const closed = isPast(cfg.deadline) || cfg.closed === true;

  const key = (pi, vi=-1) => vi===-1 ? `p${pi}` : `p${pi}v${vi}`;

  const changeQty = (k, delta, stock, perLimit) => {
    setQty(prev => {
      let v = (prev[k]||0) + delta;
      v = Math.max(0, v);
      if (perLimit > 0) v = Math.min(v, perLimit);
      if (stock > 0) v = Math.min(v, stock);
      return {...prev, [k]: v};
    });
  };

  const buildItems = () => {
    const items = [];
    products.forEach((p, pi) => {
      if (p.variants && p.variants.length) {
        p.variants.forEach((v, vi) => {
          const q = qty[key(pi,vi)] || 0;
          if (q > 0) items.push({name:p.name, variant:v.name, price:v.price||p.price||0, qty:q, subtotal:q*(v.price||p.price||0)});
        });
      } else {
        const q = qty[key(pi)] || 0;
        if (q > 0) items.push({name:p.name, price:p.price||0, qty:q, subtotal:q*(p.price||0)});
      }
    });
    return items;
  };

  const total = buildItems().reduce((a,i)=>a+i.subtotal,0);
  const hasItems = buildItems().length > 0;

  const submit = () => {
    if (!nickname.trim()) return setErr('請填寫群組暱稱');
    if (!phone.trim()) return setErr('請填寫聯絡電話');
    if (!/^[0-9]{8,10}$/.test(phone.replace(/[-\s]/g,''))) return setErr('電話格式不正確（8-10位數字）');
    const items = buildItems();
    if (!items.length) return setErr('請至少選擇一個品項');
    setErr('');
    onConfirm({
      nickname: nickname.trim(), phone: phone.trim(), note: note.trim(),
      items, total,
      name: `${nickname.trim()}（${phone.trim()}）`,
      roundId: cfg.roundId, roundName: cfg.roundName
    });
  };

  return (
    <div>
      <div className="header">
        <div className="header-brand">半吊子廚房</div>
        <div className="header-sub">The Half Kitchen · {cfg.roundName||'團購下單'}</div>
      </div>
      <div className="container">
        <div className="page-top">
          <div className="page-title">{cfg.title||'團購下單'}</div>
          {cfg.description && <div className="page-desc">{cfg.description}</div>}
          <div>
            {cfg.deliveryDate && <span className="info-chip">📦 {cfg.deliveryDate}</span>}
            {cfg.deadline && (
              <span className="info-chip" style={{color: closed?'var(--red)':'var(--amber)'}}>
                ⏰ {closed?'已截止':'截止 '+new Date(cfg.deadline).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}
              </span>
            )}
          </div>
        </div>

        {closed && <div className="alert alert-red">⚠️ {cfg.closed ? '此團購已結團，感謝所有參與的朋友！' : '此團購已截止，目前無法下單。'}</div>}

        {!closed && <>
          <div className="card">
            <div className="section-label">購買者資料</div>
            <div className="field">
              <label>群組暱稱 <span className="req">*</span></label>
              <input type="text" value={nickname} onChange={e=>setNickname(e.target.value)} placeholder="例：小明" />
            </div>
            <div className="field" style={{marginBottom:0}}>
              <label>聯絡電話 <span className="req">*</span></label>
              <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="0912-345-678" />
            </div>
          </div>

          <div className="section-label" style={{padding:'2px 4px',marginBottom:8}}>選擇品項</div>
          {products.map((p, pi) => {
            const pClosed = isPast(p.deadline);
            const hasVariants = p.variants && p.variants.length > 0;
            const hasAny = hasVariants
              ? p.variants.some((_,vi)=>(qty[key(pi,vi)]||0)>0)
              : (qty[key(pi)]||0) > 0;
            return (
              <div key={pi} className={`product-card ${hasAny?'active':''}`}>
                <div className="product-name">{p.name}</div>
                {p.description && <div style={{fontSize:13,color:'var(--text-muted)',margin:'4px 0 0'}}>{p.description}</div>}
                <div className="product-meta">
                  {pClosed && <span className="tag tag-red">已截止</span>}
                  {p.deliveryDate && <span className="tag tag-green">📦 {p.deliveryDate}</span>}
                  {p.perLimit>0 && <span className="tag tag-purple">限購 {p.perLimit}</span>}
                </div>

                {hasVariants ? <>
                  <div className="divider" style={{margin:'12px 0 8px'}} />
                  {p.variants.map((v, vi) => {
                    const k = key(pi,vi);
                    const q = qty[k]||0;
                    const stock = v.stock||0;
                    const full = stock>0 && q>=stock;
                    const low  = stock>0 && stock-q<=5 && !full;
                    return (
                      <div key={vi} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                        <div>
                          <div style={{fontSize:14,fontWeight:500}}>{v.name}</div>
                          <div className="product-price" style={{fontSize:15}}>NT$ {(v.price||p.price||0).toLocaleString()}</div>
                          {low && <span className="tag tag-amber" style={{marginTop:4}}>⚡ 僅剩 {stock-q}</span>}
                          {full && <span className="tag tag-red" style={{marginTop:4}}>額滿</span>}
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                          <button className="qty-btn" onClick={()=>changeQty(k,-1,stock,p.perLimit||0)} disabled={q===0||pClosed}>−</button>
                          <span className="qty-val">{q}</span>
                          <button className="qty-btn" onClick={()=>changeQty(k,1,stock,p.perLimit||0)} disabled={full||pClosed}>+</button>
                        </div>
                      </div>
                    );
                  })}
                </> : (() => {
                  const k = key(pi);
                  const q = qty[k]||0;
                  const stock = p.stock||0;
                  const full = stock>0 && q>=stock;
                  const low  = stock>0 && stock-q<=5 && !full;
                  return (
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:10}}>
                      <div>
                        <div className="product-price">NT$ {(p.price||0).toLocaleString()}</div>
                        <div style={{marginTop:5,display:'flex',gap:5,flexWrap:'wrap'}}>
                          {low && <span className="tag tag-amber">⚡ 僅剩 {stock-q}</span>}
                          {full && <span className="tag tag-red">額滿</span>}
                        </div>
                        {stock>0 && (
                          <div className="progress-bar" style={{width:140,marginTop:8}}>
                            <div className="progress-fill" style={{width:`${Math.min(100,q/stock*100)}%`}} />
                          </div>
                        )}
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <button className="qty-btn" onClick={()=>changeQty(k,-1,stock,p.perLimit||0)} disabled={q===0||pClosed}>−</button>
                        <span className="qty-val">{q}</span>
                        <button className="qty-btn" onClick={()=>changeQty(k,1,stock,p.perLimit||0)} disabled={full||pClosed}>+</button>
                      </div>
                    </div>
                  );
                })()}
              </div>
            );
          })}

          <div className="card">
            <div className="section-label">備註（可略）</div>
            <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="有任何特殊需求請備註…" />
          </div>

          {err && <div className="alert alert-red">{err}</div>}

          {hasItems && (
            <div className="card sticky-foot" style={{boxShadow:'0 -2px 20px rgba(28,16,8,.12)'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:13}}>
                <span style={{fontWeight:600,fontSize:16}}>合計金額</span>
                <span style={{fontFamily:'Noto Serif TC',fontSize:22,fontWeight:700,color:'var(--accent)'}}>{fmtMoney(total)}</span>
              </div>
              <button className="btn btn-primary" onClick={submit}>下一步 → 確認訂單</button>
            </div>
          )}
          {!hasItems && (
            <button className="btn btn-primary" style={{opacity:.55}} onClick={submit}>下一步 → 確認訂單</button>
          )}
        </>}

        <div className="footer-links">
          <span className="footer-link" onClick={()=>goto('query')}>查詢我的訂單</span>
          <span className="footer-link" onClick={()=>goto('admin-login')}>管理員登入</span>
        </div>
      </div>
    </div>
  );
}

function QueryPage({ onBack }) {
  const [phone, setPhone]   = useState('');
  const [orders, setOrders] = useState(null);
  const [loading, setLoading] = useState(false);

  const search = async () => {
    if (!phone.trim()) return;
    setLoading(true);
    try {
      const snap = await db.collection('orders').where('phone','==',phone.trim()).orderBy('ts','desc').get();
      setOrders(snap.docs.map(d=>({id:d.id,...d.data()})));
    } catch(e) { setOrders([]); }
    setLoading(false);
  };

  const grouped = {};
  (orders||[]).forEach(o => {
    const k = o.roundName||'舊訂單';
    if (!grouped[k]) grouped[k]=[];
    grouped[k].push(o);
  });

  return (
    <div>
      <div className="header"><div className="header-brand">訂單查詢</div></div>
      <div className="container">
        <div className="page-top"><span className="back-btn" onClick={onBack}>← 返回</span></div>
        <div className="card">
          <div className="section-label">輸入電話查詢歷史訂單</div>
          <div className="input-row">
            <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="09XX-XXX-XXX" onKeyDown={e=>e.key==='Enter'&&search()} />
            <button className="btn btn-primary" style={{width:'auto',padding:'10px 20px'}} onClick={search} disabled={loading}>查詢</button>
          </div>
        </div>
        {loading && <div className="loading">查詢中…</div>}
        {orders!==null && !loading && (
          orders.length===0
            ? <div className="empty-state"><div style={{fontSize:36,marginBottom:12}}>🔍</div>找不到此電話的訂單記錄</div>
            : Object.keys(grouped).map(round=>(
              <div key={round}>
                <div style={{fontFamily:'Noto Serif TC',fontSize:14,fontWeight:600,color:'var(--text-muted)',margin:'14px 0 8px'}}>{round}</div>
                {grouped[round].map(o=>(
                  <div key={o.id} className="card" style={{marginBottom:9}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                      <span style={{fontWeight:600}}>{o.nickname}</span>
                      <span style={{fontSize:12,color:'var(--text-muted)'}}>{fmtTs(o.ts)}</span>
                    </div>
                    {o.items.map((item,i)=>(
                      <div key={i} className="order-row" style={{fontSize:14}}>
                        <span>{item.name}{item.variant?` - ${item.variant}`:''} ×{item.qty}</span>
                        <span>{fmtMoney(item.subtotal)}</span>
                      </div>
                    ))}
                    <div style={{display:'flex',justifyContent:'space-between',paddingTop:10,fontWeight:700}}>
                      <span>合計</span>
                      <span style={{color:'var(--accent)'}}>{fmtMoney(o.total)}</span>
                    </div>
                    {o.pickedUp && <div style={{marginTop:8}}><span className="tag tag-green">✓ 已取貨</span></div>}
                  </div>
                ))}
              </div>
            ))
        )}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  Admin Orders
// ══════════════════════════════════════════════════════
function AdminOrders({ cfg, refreshCfg, goto }) {
  const [orders, setOrders]     = useState([]);
  const [loading, setLoading]   = useState(true);
  const [view, setView]         = useState('current');
  const [editOrder, setEditOrder] = useState(null);
  const [newRound, setNewRound] = useState('');
  const [showNewRound, setShowNewRound] = useState(false);
  const [showFixRound, setShowFixRound] = useState(false);
  const [allRounds, setAllRounds] = useState([]);
  const [fixLoading, setFixLoading] = useState(false);
  const [closingRound, setClosingRound] = useState(false);

  useEffect(()=>{ loadOrders(); }, [view]);

  const loadOrders = async () => {
    setLoading(true);
    try { setOrders(await getOrders(view==='current'?cfg?.roundId:null)); }
    catch(e) {}
    setLoading(false);
  };

  const totalAmt   = orders.reduce((a,o)=>a+o.total,0);
  const uniquePpl  = new Set(orders.map(o=>o.phone)).size;

  const prodStats = {};
  const prodStocks = {};
  (cfg?.products||[]).forEach(p=>{
    if (p.variants&&p.variants.length) {
      p.variants.forEach(v=>{ const k=`${p.name} - ${v.name}`; prodStats[k]=0; prodStocks[k]=v.stock||p.stock||0; });
    } else { prodStats[p.name]=0; prodStocks[p.name]=p.stock||0; }
  });
  orders.forEach(o=>{
    (o.items||[]).forEach(item=>{
      const k=item.variant?`${item.name} - ${item.variant}`:item.name;
      prodStats[k]=(prodStats[k]||0)+item.qty;
    });
  });

  const startNewRound = async () => {
    if (!newRound.trim()) return;
    await saveConfig({...cfg, roundId:genId(), roundName:newRound.trim(), deadline:'', deliveryDate:'', pickupNote:'', closed:false});
    await refreshCfg();
    setShowNewRound(false); setNewRound('');
    goto('setup');
  };

  const openFixRound = async () => {
    setFixLoading(true);
    setShowFixRound(true);
    try {
      const snap = await db.collection('orders').get();
      const roundMap = {};
      snap.docs.forEach(d => {
        const data = d.data();
        const rid = data.roundId || '（無團次 ID）';
        const rname = data.roundName || '舊團次';
        if (!roundMap[rid]) roundMap[rid] = {roundId:rid, roundName:rname, count:0, latest:0};
        roundMap[rid].count++;
        if (data.ts > roundMap[rid].latest) roundMap[rid].latest = data.ts;
      });
      const sorted = Object.values(roundMap).sort((a,b)=>b.latest-a.latest);
      setAllRounds(sorted);
    } catch(e) {}
    setFixLoading(false);
  };

  const applyRoundId = async (round) => {
    await saveConfig({...cfg, roundId:round.roundId, roundName:round.roundName, closed:false});
    await refreshCfg();
    setShowFixRound(false);
    setView('current');
    loadOrders();
  };

  const toggleClose = async () => {
    const nowClosed = cfg?.closed === true;
    if (!nowClosed && !window.confirm('確定要結團嗎？結團後客人將無法新增下單。')) return;
    setClosingRound(true);
    await saveConfig({...cfg, closed: !nowClosed});
    await refreshCfg();
    setClosingRound(false);
  };

  const exportCSV = type => {
    if (type==='pickup') {
      const pkeys = Object.keys(prodStats);
      const hdr = ['暱稱','電話',...pkeys,'合計','備註'];
      const rows = orders.map(o=>{
        const row=[o.nickname,o.phone];
        pkeys.forEach(p=>{ const item=(o.items||[]).find(i=>(i.variant?`${i.name} - ${i.variant}`:i.name)===p); row.push(item?item.qty:0); });
        return [...row,o.total,o.note||''];
      });
      downloadCSV([hdr,...rows], `取貨核對表_${cfg?.roundName||''}.csv`);
    } else {
      const rows=[['品項','數量','單價','小計']];
      Object.keys(prodStats).forEach(k=>{
        let price=0;
        for (const o of orders){const item=(o.items||[]).find(i=>(i.variant?`${i.name} - ${i.variant}`:i.name)===k);if(item){price=item.price;break;}}
        rows.push([k,prodStats[k],price,prodStats[k]*price]);
      });
      rows.push(['合計','','',totalAmt]);
      downloadCSV(rows, `叫貨統計_${cfg?.roundName||''}.csv`);
    }
  };

  return (
    <div>
      <div className="header">
        <div className="header-brand">後台管理</div>
        <div className="header-sub">{cfg?.roundName||''} · {cfg?.title||''}</div>
      </div>
      <div className="container">
        <div style={{paddingTop:14}}>
          <div className="scroll-tabs">
            <div className="scroll-tab active">📋 訂單</div>
            <div className="scroll-tab" onClick={()=>goto('pickup')}>📦 取貨</div>
            <div className="scroll-tab" onClick={()=>goto('setup')}>⚙️ 設定</div>
            <div className="scroll-tab" onClick={openFixRound} style={{color:'var(--amber)'}}>🔧 修復本團</div>
            <div className="scroll-tab" onClick={()=>setShowNewRound(true)}>🔄 開新團</div>
            <div className="scroll-tab"
              onClick={toggleClose}
              style={{color: cfg?.closed?'var(--green)':'var(--red)', borderColor: cfg?.closed?'var(--green)':'var(--red)'}}>
              {closingRound ? '處理中…' : cfg?.closed ? '▶ 重新開放' : '🔒 結團'}
            </div>
          </div>

          {cfg?.closed && (
            <div className="alert alert-red" style={{marginBottom:14}}>
              🔒 本團已結團，客人目前無法新增下單。點「重新開放」可恢復。
            </div>
          )}

          <div className="stat-grid">
            <div className="stat-card"><div className="stat-val">{orders.length}</div><div className="stat-lbl">訂單數</div></div>
            <div className="stat-card"><div className="stat-val">{uniquePpl}</div><div className="stat-lbl">下單人數</div></div>
            <div className="stat-card"><div className="stat-val" style={{fontSize:16}}>{fmtMoney(totalAmt)}</div><div className="stat-lbl">總金額</div></div>
          </div>

          {Object.keys(prodStats).length>0 && (
            <div className="card" style={{marginBottom:14}}>
              <div className="section-label">品項統計</div>
              <div className="tags-row">
                {Object.keys(prodStats).map(k=><span key={k} className="tag tag-accent">{k} × {prodStats[k]}</span>)}
              </div>
              {Object.keys(prodStats).map(k=>{
                const stock=prodStocks[k]||0;
                if (!stock) return null;
                const pct=Math.min(100, prodStats[k]/stock*100);
                return (
                  <div key={k} style={{marginBottom:9}}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}}>
                      <span>{k}</span>
                      <span style={{color:'var(--text-muted)'}}>{prodStats[k]} / {stock}</span>
                    </div>
                    <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
                  </div>
                );
              })}
            </div>
          )}

          <div className="pill-tabs">
            <div className={`pill-tab ${view==='current'?'active':''}`} onClick={()=>setView('current')}>本團</div>
            <div className={`pill-tab ${view==='all'?'active':''}`} onClick={()=>setView('all')}>所有團次</div>
          </div>

          <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
            <button className="copy-btn" onClick={()=>exportCSV('pickup')}>⬇ 取貨核對表</button>
            <button className="copy-btn" onClick={()=>exportCSV('order')}>⬇ 叫貨統計</button>
          </div>

          {loading ? <div className="loading">載入中…</div>
           : orders.length===0
             ? <div className="empty-state"><div style={{fontSize:36,marginBottom:12}}>📋</div>目前沒有訂單</div>
             : orders.map(o=>(
               <div key={o.id} className="order-item">
                 <div className="order-hdr">
                   <div>
                     <span className="order-person">{o.nickname}</span>
                     <span style={{fontWeight:400,fontSize:13,color:'var(--text-muted)',marginLeft:5}}>({o.phone})</span>
                     {view==='all' && <div style={{marginTop:3}}><span className="tag tag-gray">{o.roundName}</span></div>}
                   </div>
                   <span className="order-time">{fmtTs(o.ts)}</span>
                 </div>
                 <div style={{fontSize:13,color:'var(--text-muted)',marginBottom:6}}>
                   {(o.items||[]).map((item,i)=><span key={i}>{item.name}{item.variant?` - ${item.variant}`:''} ×{item.qty}　</span>)}
                 </div>
                 {o.note && <div style={{fontSize:12,color:'var(--amber)',marginBottom:7}}>備註：{o.note}</div>}
                 <div className="order-foot">
                   <div>{o.pickedUp && <span className="tag tag-green">✓ 已取貨</span>}</div>
                   <div style={{display:'flex',alignItems:'center',gap:8}}>
                     <span className="order-sum">{fmtMoney(o.total)}</span>
                     <button className="btn btn-ghost btn-sm" onClick={()=>setEditOrder(o)}>編輯</button>
                   </div>
                 </div>
               </div>
             ))
          }
        </div>
      </div>

      {editOrder && <EditModal order={editOrder} onClose={()=>setEditOrder(null)} onSaved={()=>{ setEditOrder(null); loadOrders(); }} />}

      {showFixRound && (
        <div className="modal-bg" onClick={()=>setShowFixRound(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">🔧 修復本團 — 選擇正確團次</div>
            <div className="alert alert-amber" style={{marginBottom:14}}>
              系統掃描了 Firestore 中的所有訂單，請點選目前仍在進行中的那一團，將它設為「本團」。
            </div>
            {fixLoading ? <div className="loading" style={{padding:'24px 0'}}>掃描中…</div> :
              allRounds.length === 0
                ? <div className="empty-state">找不到任何訂單記錄</div>
                : allRounds.map(r => (
                  <div key={r.roundId} style={{
                    background:'var(--bg)', borderRadius:'var(--r-card)', padding:'14px 16px',
                    marginBottom:9, border:`1.5px solid ${r.roundId===cfg?.roundId?'var(--accent)':'var(--border)'}`,
                    cursor:'pointer'
                  }} onClick={()=>applyRoundId(r)}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:15}}>{r.roundName}</div>
                        <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>
                          {r.count} 筆訂單 · 最後下單 {fmtTs(r.latest)}
                        </div>
                        <div style={{fontSize:11,color:'var(--text-muted)',marginTop:1,fontFamily:'monospace'}}>{r.roundId}</div>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:5}}>
                        {r.roundId===cfg?.roundId && <span className="tag tag-accent">目前設定</span>}
                        <span className="tag tag-green" style={{cursor:'pointer'}}>設為本團 →</span>
                      </div>
                    </div>
                  </div>
                ))
            }
            <div style={{marginTop:14}}>
              <button className="btn btn-ghost btn-full" onClick={()=>setShowFixRound(false)}>取消</button>
            </div>
          </div>
        </div>
      )}

      {showNewRound && (
        <div className="modal-bg" onClick={()=>setShowNewRound(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">開啟新一團</div>
            <div className="alert alert-amber" style={{marginBottom:14}}>舊訂單將完整保留，系統將產生新的團次 ID 並跳至設定頁。</div>
            <div className="field">
              <label>新團次名稱</label>
              <input type="text" value={newRound} onChange={e=>setNewRound(e.target.value)} placeholder="例：第 2 團" autoFocus />
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setShowNewRound(false)}>取消</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={startNewRound}>確認開新團</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Edit Order Modal ──────────────────────────────────
function EditModal({ order, onClose, onSaved }) {
  const [nickname, setNickname] = useState(order.nickname);
  const [phone, setPhone]       = useState(order.phone);
  const [items, setItems]       = useState(order.items.map(i=>({...i})));
  const [note, setNote]         = useState(order.note||'');
  const [loading, setLoading]   = useState(false);

  const total = items.reduce((a,i)=>a+i.qty*i.price,0);

  const setItemQty = (i, delta) => {
    setItems(prev=>{
      const next=[...prev];
      next[i]={...next[i], qty:Math.max(0,next[i].qty+delta)};
      next[i].subtotal=next[i].qty*next[i].price;
      return next.filter(x=>x.qty>0);
    });
  };

  const save = async () => {
    setLoading(true);
    try {
      await updateOrder(order.id, {nickname,phone,name:`${nickname}（${phone}）`,items,note,total});
      onSaved();
    } catch(e){ setLoading(false); }
  };

  const del = async () => {
    if (!window.confirm('確定要刪除此訂單？')) return;
    setLoading(true);
    await deleteOrder(order.id);
    onSaved();
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">編輯訂單</div>
        <div className="form-row" style={{marginBottom:12}}>
          <div className="field" style={{marginBottom:0}}>
            <label>暱稱</label>
            <input type="text" value={nickname} onChange={e=>setNickname(e.target.value)} />
          </div>
          <div className="field" style={{marginBottom:0}}>
            <label>電話</label>
            <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} />
          </div>
        </div>
        <div className="section-label">品項數量（設為 0 = 移除）</div>
        {items.map((item,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div>
              <div style={{fontSize:14,fontWeight:500}}>{item.name}{item.variant?` - ${item.variant}`:''}</div>
              <div style={{fontSize:13,color:'var(--text-muted)'}}>NT$ {item.price.toLocaleString()}</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <button className="qty-btn" onClick={()=>setItemQty(i,-1)}>−</button>
              <span className="qty-val">{item.qty}</span>
              <button className="qty-btn" onClick={()=>setItemQty(i,1)}>+</button>
            </div>
          </div>
        ))}
        <div className="field">
          <label>備註</label>
          <textarea value={note} onChange={e=>setNote(e.target.value)} style={{minHeight:56}} />
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:14,fontWeight:700}}>
          <span>合計</span>
          <span style={{color:'var(--accent)'}}>{fmtMoney(total)}</span>
        </div>
        <div className="modal-actions">
          <button className="btn btn-danger btn-sm" onClick={del} disabled={loading}>刪除訂單</button>
          <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>取消</button>
          <button className="btn btn-primary" style={{flex:1}} onClick={save} disabled={loading}>儲存</button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  Pickup
// ══════════════════════════════════════════════════════
function PickupPage({ cfg, onBack }) {
  const [orders, setOrders]       = useState([]);
  const [loading, setLoading]     = useState(true);
  const [tab, setTab]             = useState('search');
  const [searchPh, setSearchPh]   = useState('');
  const [results, setResults]     = useState(null);
  const [marking, setMarking]     = useState('');
  const [copied, setCopied]       = useState('');

  useEffect(()=>{ loadOrders(); }, []);

  const loadOrders = async () => {
    setLoading(true);
    try { setOrders(await getOrders(cfg?.roundId)); }
    catch(e) {}
    setLoading(false);
  };

  const search = () => {
    const q = searchPh.trim().replace(/[-\s]/g,'');
    setResults(orders.filter(o=>o.phone.replace(/[-\s]/g,'')===q));
  };

  const markPickup = async (id, picked) => {
    setMarking(id);
    await updateOrder(id, {pickedUp:picked, pickedUpAt:picked?Date.now():null});
    await loadOrders();
    if (results) setResults(prev=>prev.map(o=>o.id===id?{...o,pickedUp:picked}:o));
    setMarking('');
  };

  const pending  = orders.filter(o=>!o.pickedUp);
  const pickedUp = orders.filter(o=>o.pickedUp);

  const copyMsg = (type) => {
    let text;
    if (type==='pending') {
      text = `📦 尚未取貨名單（${pending.length} 人）\n`
           + pending.map(o=>`• ${o.nickname}（${o.phone}）— ${fmtMoney(o.total)}`).join('\n')
           + '\n\n請儘快前來取貨，謝謝！';
    } else {
      text = pending.map(o=>`${o.nickname}（${o.phone}）`).join('\n');
    }
    copyText(text, ()=>{ setCopied(type); setTimeout(()=>setCopied(''),2000); });
  };

  const OrderCard = ({o}) => (
    <div className="pickup-result">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
        <div>
          <div style={{fontWeight:600,fontSize:15}}>{o.nickname} <span style={{fontWeight:400,fontSize:13,color:'var(--text-muted)'}}>({o.phone})</span></div>
          {o.pickedUpAt && <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>取貨：{fmtTs(o.pickedUpAt)}</div>}
        </div>
        <div style={{fontFamily:'Noto Serif TC',fontSize:18,fontWeight:700,color:'var(--accent)'}}>{fmtMoney(o.total)}</div>
      </div>
      <div style={{fontSize:13,color:'var(--text-muted)',marginBottom:10}}>
        {(o.items||[]).map((item,i)=>`${item.name}${item.variant?` - ${item.variant}`:''} ×${item.qty}`).join('　')}
      </div>
      {o.note && <div style={{fontSize:12,color:'var(--amber)',marginBottom:8}}>備註：{o.note}</div>}
      {o.pickedUp
        ? <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span className="tag tag-green">✓ 已取貨</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>markPickup(o.id,false)} disabled={marking===o.id}>撤銷</button>
          </div>
        : <button className="btn btn-green btn-full" onClick={()=>markPickup(o.id,true)} disabled={marking===o.id}>
            {marking===o.id?'處理中…':'✓ 標記已取貨'}
          </button>
      }
    </div>
  );

  return (
    <div>
      <div className="header">
        <div className="header-brand">取貨管理</div>
        <div className="header-sub">{cfg?.roundName||''}</div>
      </div>
      <div className="container">
        <div style={{paddingTop:14}}>
          <span className="back-btn" onClick={onBack}>← 返回訂單</span>
          <div className="pickup-stat-bar">
            <div className="pickup-stat">本團 <b>{orders.length}</b></div>
            <div className="pickup-stat">已取 <b style={{color:'var(--green)'}}>{pickedUp.length}</b></div>
            <div className="pickup-stat">未取 <b style={{color:'var(--red)'}}>{pending.length}</b></div>
          </div>
          <div className="pill-tabs">
            <div className={`pill-tab ${tab==='search'?'active':''}`} onClick={()=>setTab('search')}>🔍 搜尋</div>
            <div className={`pill-tab ${tab==='pending'?'active':''}`} onClick={()=>setTab('pending')}>未取 ({pending.length})</div>
            <div className={`pill-tab ${tab==='done'?'active':''}`} onClick={()=>setTab('done')}>已取 ({pickedUp.length})</div>
          </div>

          {loading ? <div className="loading">載入中…</div> : <>
            {tab==='search' && <>
              <div className="input-row" style={{marginBottom:16}}>
                <input type="tel" value={searchPh} onChange={e=>setSearchPh(e.target.value)} placeholder="輸入電話搜尋" onKeyDown={e=>e.key==='Enter'&&search()} />
                <button className="btn btn-primary" style={{width:'auto',padding:'10px 20px'}} onClick={search}>搜尋</button>
              </div>
              {results && (
                results.length===0
                  ? <div className="empty-state">找不到此電話的訂單</div>
                  : results.map(o=><OrderCard key={o.id} o={o} />)
              )}
            </>}

            {tab==='pending' && <>
              <div style={{display:'flex',gap:8,marginBottom:13,flexWrap:'wrap'}}>
                <button className="copy-btn" onClick={()=>copyMsg('pending')}>{copied==='pending'?'✓ 已複製':'📋 複製催取訊息'}</button>
                <button className="copy-btn" onClick={()=>copyMsg('list')}>{copied==='list'?'✓ 已複製':'📋 複製未取名單'}</button>
              </div>
              {pending.length===0
                ? <div className="empty-state"><div style={{fontSize:36,marginBottom:12}}>🎉</div>所有訂單均已取貨！</div>
                : pending.map(o=><OrderCard key={o.id} o={o} />)
              }
            </>}

            {tab==='done' && (
              pickedUp.length===0
                ? <div className="empty-state">尚無取貨紀錄</div>
                : pickedUp.map(o=><OrderCard key={o.id} o={o} />)
            )}
          </>}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  Setup
// ══════════════════════════════════════════════════════
function SetupPage({ cfg, onSaved, onBack }) {
  const init = {
    title:'', description:'', deliveryDate:'', deadline:'',
    pickupNote:'', adminPass:'', accessCode:'', roundName:'',
    products: []
  };
  const [form, setForm] = useState({...init, ...(cfg||{}), products: cfg?.products ? JSON.parse(JSON.stringify(cfg.products)) : []});
  const [saving, setSaving] = useState(false);
  const [saved, setSaved]   = useState(false);

  const set = (k,v) => setForm(p=>({...p,[k]:v}));

  const addProd = () => set('products',[...form.products,{name:'',price:0,stock:0,perLimit:0,description:'',variants:[]}]);
  const rmProd  = i  => set('products',form.products.filter((_,idx)=>idx!==i));
  const setProd = (i,k,v) => { const ps=[...form.products]; ps[i]={...ps[i],[k]:v}; set('products',ps); };

  const addVar  = pi => { const ps=[...form.products]; ps[pi].variants=[...(ps[pi].variants||[]),{name:'',price:0,stock:0}]; set('products',ps); };
  const rmVar   = (pi,vi) => { const ps=[...form.products]; ps[pi].variants=ps[pi].variants.filter((_,i)=>i!==vi); set('products',ps); };
  const setVar  = (pi,vi,k,v) => { const ps=[...form.products]; ps[pi].variants[vi]={...ps[pi].variants[vi],[k]:v}; set('products',ps); };

  const save = async () => {
    setSaving(true);
    try {
      await saveConfig({
        ...(cfg||{}), ...form,
        roundId: cfg?.roundId || genId(),
        products: form.products.map(p=>({
          ...p, price:Number(p.price)||0, stock:Number(p.stock)||0, perLimit:Number(p.perLimit)||0,
          variants:(p.variants||[]).map(v=>({...v,price:Number(v.price)||0,stock:Number(v.stock)||0}))
        }))
      });
      setSaved(true);
      setTimeout(()=>setSaved(false),2500);
      onSaved();
    } catch(e) {}
    setSaving(false);
  };

  return (
    <div>
      <div className="header"><div className="header-brand">團購設定</div></div>
      <div className="container">
        <div style={{paddingTop:14}}>
          {onBack && <span className="back-btn" onClick={onBack}>← 返回訂單</span>}

          <div className="card">
            <div className="section-label">基本資訊</div>
            <div className="field">
              <label>團次名稱</label>
              <input type="text" value={form.roundName} onChange={e=>set('roundName',e.target.value)} placeholder="例：第 1 團" />
            </div>
            <div className="field">
              <label>團購名稱（顯示於頁面）</label>
              <input type="text" value={form.title} onChange={e=>set('title',e.target.value)} placeholder="例：雪球餅乾團購" />
            </div>
            <div className="field">
              <label>團購說明</label>
              <textarea value={form.description} onChange={e=>set('description',e.target.value)} placeholder="說明文字，支援換行…" />
            </div>
            <div className="form-row">
              <div className="field" style={{marginBottom:0}}>
                <label>截止時間</label>
                <input type="datetime-local" value={form.deadline} onChange={e=>set('deadline',e.target.value)} />
              </div>
              <div className="field" style={{marginBottom:0}}>
                <label>取貨時間（顯示文字）</label>
                <input type="text" value={form.deliveryDate} onChange={e=>set('deliveryDate',e.target.value)} placeholder="例：6月15日 14:00-18:00" />
              </div>
            </div>
          </div>

          <div className="card">
            <div className="section-label">取貨說明</div>
            <textarea value={form.pickupNote} onChange={e=>set('pickupNote',e.target.value)} placeholder="取貨地點、注意事項…（顯示於確認頁）" />
          </div>

          <div className="card">
            <div className="section-label">安全設定</div>
            <div className="form-row">
              <div className="field" style={{marginBottom:0}}>
                <label>管理員密碼 <span className="req">*</span></label>
                <input type="text" value={form.adminPass} onChange={e=>set('adminPass',e.target.value)} placeholder="設定密碼" />
              </div>
              <div className="field" style={{marginBottom:0}}>
                <label>消費者入場碼（空白=不需要）</label>
                <input type="text" value={form.accessCode} onChange={e=>set('accessCode',e.target.value)} placeholder="可留空" />
              </div>
            </div>
          </div>

          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div className="section-label" style={{marginBottom:0}}>品項管理</div>
            <button className="btn btn-outline btn-sm" onClick={addProd}>+ 新增品項</button>
          </div>

          {form.products.map((p,pi)=>(
            <div key={pi} className="prod-editor">
              <div className="prod-editor-hdr">
                <span style={{fontWeight:600}}>品項 {pi+1}</span>
                <button className="btn btn-danger btn-sm" onClick={()=>rmProd(pi)}>刪除</button>
              </div>
              <div className="form-row">
                <div className="field" style={{marginBottom:8}}>
                  <label>品項名稱</label>
                  <input type="text" value={p.name} onChange={e=>setProd(pi,'name',e.target.value)} placeholder="品項名稱" />
                </div>
                <div className="field" style={{marginBottom:8}}>
                  <label>簡短說明（可略）</label>
                  <input type="text" value={p.description||''} onChange={e=>setProd(pi,'description',e.target.value)} placeholder="說明" />
                </div>
              </div>
              {(!p.variants||!p.variants.length) && (
                <div className="form-row">
                  <div className="field" style={{marginBottom:8}}>
                    <label>售價（NT$）</label>
                    <input type="number" value={p.price} onChange={e=>setProd(pi,'price',e.target.value)} min="0" />
                  </div>
                  <div className="field" style={{marginBottom:8}}>
                    <label>庫存上限（0=無限）</label>
                    <input type="number" value={p.stock} onChange={e=>setProd(pi,'stock',e.target.value)} min="0" />
                  </div>
                </div>
              )}
              <div className="form-row">
                <div className="field" style={{marginBottom:8}}>
                  <label>每人限購（0=不限）</label>
                  <input type="number" value={p.perLimit} onChange={e=>setProd(pi,'perLimit',e.target.value)} min="0" />
                </div>
                <div className="field" style={{marginBottom:8}}>
                  <label>獨立截止時間（可略）</label>
                  <input type="datetime-local" value={p.deadline||''} onChange={e=>setProd(pi,'deadline',e.target.value)} />
                </div>
              </div>
              <div className="field">
                <label>獨立取貨時間（可略）</label>
                <input type="text" value={p.deliveryDate||''} onChange={e=>setProd(pi,'deliveryDate',e.target.value)} placeholder="例：6月16日上午" />
              </div>

              {(p.variants||[]).length>0 && <>
                <div className="section-label" style={{marginBottom:7,marginTop:4}}>規格列表</div>
                {p.variants.map((v,vi)=>(
                  <div key={vi} style={{display:'flex',gap:7,marginBottom:8,alignItems:'flex-end'}}>
                    <div className="field" style={{marginBottom:0,flex:2}}>
                      {vi===0 && <label style={{fontSize:12}}>規格名稱</label>}
                      <input type="text" value={v.name} onChange={e=>setVar(pi,vi,'name',e.target.value)} placeholder="例：原味" />
                    </div>
                    <div className="field" style={{marginBottom:0,flex:1}}>
                      {vi===0 && <label style={{fontSize:12}}>售價</label>}
                      <input type="number" value={v.price} onChange={e=>setVar(pi,vi,'price',e.target.value)} min="0" />
                    </div>
                    <div className="field" style={{marginBottom:0,flex:1}}>
                      {vi===0 && <label style={{fontSize:12}}>庫存</label>}
                      <input type="number" value={v.stock} onChange={e=>setVar(pi,vi,'stock',e.target.value)} min="0" />
                    </div>
                    <button className="btn btn-danger btn-sm" style={{flexShrink:0}} onClick={()=>rmVar(pi,vi)}>✕</button>
                  </div>
                ))}
              </>}
              <button className="btn btn-ghost btn-sm" style={{marginTop:4}} onClick={()=>addVar(pi)}>+ 新增規格</button>
            </div>
          ))}

          {saved && <div className="alert alert-green">✓ 設定已儲存</div>}
          <button className="btn btn-primary" onClick={save} disabled={saving} style={{marginTop:6}}>
            {saving?'儲存中…':'儲存設定'}
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
